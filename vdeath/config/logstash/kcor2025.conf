input {
  file {
    path => "/tmp/kcor2025-import/*_CUMD-WK.csv"
    sincedb_path => "/dev/null"
    start_position => "beginning"
    mode => "read"
    file_completed_action => "log"
    file_completed_log_path => "/tmp/kcor2025-completed.log"
  }
}

filter {
  csv {
    autodetect_column_names => true
  }
  if [id] == "id" { drop {} }
  mutate {
    convert => {
      "dose" => "integer"
      "deaths" => "integer"
    }
    remove_field => ["message", "host", "path", "@version", "@timestamp", "event", "log"]
  }
}

output {
  elasticsearch {
    hosts => ["${ES_URL:http://127.0.0.1:9200}"]
    user => "${ES_USER:elastic}"
    password => "${ES_PASSWORD}"
    index => "kcor2025"
    document_id => "%{id}"
    action => "index"
  }
}
